<div class="campaign-editor">
  <div class="editor-content">
    <app-campaign-stepper
      [currentStep]="currentStep"
      [editMode]="isEditMode"
      (stepSelected)="goToStep($event)"
    />

    @if (currentStep === 1) { <app-campaign-basic-step /> }
    @if (currentStep === 2) { <app-campaign-type-step /> }
    @if (currentStep === 3) { <app-campaign-donation-step /> }
    @if (currentStep === 4) { <app-campaign-rewards-step /> }
    @if (currentStep === 5) { <app-campaign-sponsors-step /> }
    @if (currentStep === 6) { <app-campaign-ambassadors-step /> }
    @if (currentStep === 7) { <app-campaign-updates-step /> }
    @if (currentStep === 8) { <app-campaign-page-builder-step /> }
    @if (currentStep === 9) { <app-campaign-publish-step /> }
  </div>

  <app-campaign-editor-footer
    [currentStep]="currentStep"
    [canContinue]="canContinue()"
    [isSaving]="isSaving"
    (next)="nextStep()"
    (previous)="previousStep()"
  />
</div>
