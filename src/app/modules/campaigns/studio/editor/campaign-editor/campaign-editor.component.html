<div class="campaign-editor">
  <div class="editor-content">
    <app-campaign-stepper [currentStep]="currentStep" />

    @if (currentStep === 1) { <app-campaign-basic-step /> }
    @if (currentStep === 2) { <app-campaign-type-step /> }
    @if (currentStep === 3) { <app-campaign-goals-step /> }
    @if (currentStep === 4) { <app-campaign-rewards-step /> }
    @if (currentStep === 5) { <app-campaign-sponsors-step /> }
    @if (currentStep === 6) { <app-campaign-page-builder-step /> }
    @if (currentStep === 7) { <app-campaign-publish-step /> }
  </div>

  <app-campaign-editor-footer
    [currentStep]="currentStep"
    [canContinue]="canContinue()"
    (next)="nextStep()"
    (previous)="previousStep()"
  />
</div>
