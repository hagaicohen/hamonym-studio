@if (isLoading) {
  <div class="public-loading">
    <div class="public-spinner"></div>
  </div>
} @else if (notFound) {
  <div class="public-not-found">
    <p>הקמפיין לא נמצא</p>
  </div>
} @else {
  <div class="public-preview-wrap">
    <app-campaign-preview />
  </div>
}

<app-payment-failed-popup
  *ngIf="showFailedPopup"
  (retry)="onRetryPayment()"
  (closed)="showFailedPopup = false">
</app-payment-failed-popup>
