<div class="step-container" *ngIf="draft$ | async as draft">

  <div class="step-header">
    <span class="step-icon-wrapper">
      <lucide-angular [img]="HandshakeIcon" class="step-icon" />
    </span>
    <div>
      <h2 class="step-title">חסויות</h2>
      <p class="step-desc">לוגואים של ארגונים ושותפים שיוצגו בדף הקמפיין</p>
    </div>
  </div>

  <!-- SPONSORS LIST -->
  <div class="sponsors-list" *ngIf="draft.sponsors.length > 0">
    <div class="sponsor-row" *ngFor="let sponsor of draft.sponsors">

      <!-- LOGO -->
      <input type="file" accept="image/*" hidden #logoInput (change)="onLogoSelected(sponsor.id, $event)">

      <div class="logo-slot" (click)="logoInput.click()">
        <img *ngIf="sponsor.logoUrl" [src]="sponsor.logoUrl" class="logo-img" alt="לוגו">
        <div class="logo-placeholder" *ngIf="!sponsor.logoUrl">
          <span>🏢</span>
          <span class="logo-hint">לוגו</span>
        </div>
        <div class="logo-overlay-hover" *ngIf="sponsor.logoUrl">החלף</div>
        <button class="logo-x" *ngIf="sponsor.logoUrl" (click)="$event.stopPropagation(); removeLogo(sponsor.id)">✕</button>
      </div>

      <!-- NAME -->
      <div class="sponsor-info">
        <label class="sponsor-label">שם נותן/ת החסות</label>
        <input
          class="sponsor-name-input"
          type="text"
          [(ngModel)]="sponsor.name"
          (blur)="updateName(sponsor.id, sponsor.name)"
          placeholder="למשל: קרן רוטשילד">
      </div>

      <!-- DELETE -->
      <button class="btn-delete" (click)="removeSponsor(sponsor.id)" title="מחק">✕</button>

    </div>
  </div>

  <!-- EMPTY STATE -->
  <div class="empty-state" *ngIf="draft.sponsors.length === 0">
    <div class="empty-icon">🤝</div>
    <div class="empty-text">טרם נוספו חסויות</div>
    <div class="empty-hint">חסויות הן רשות — ניתן לדלג</div>
  </div>

  <button class="btn-add" (click)="addSponsor()">+ הוסף חסות</button>

</div>
