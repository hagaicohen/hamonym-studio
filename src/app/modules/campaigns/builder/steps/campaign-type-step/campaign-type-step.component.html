<div class="campaign-type-step">

  <div class="campaign-type-header">

    <h1 class="campaign-type-title">
      בחר סוג קמפיין
    </h1>

    <p class="campaign-type-description">
      כל סוג מתאים למטרה אחרת
    </p>

  </div>

  <div class="types-list">

    @for (
      type of campaignTypes;
      track type.id
    ) {

      <button
        type="button"
        class="type-card"
        [class.selected]="draft.fundingType === type.id"
        (click)="selectType(type.id)">

        <div class="radio-area">

          @if (draft.fundingType === type.id) {

            <lucide-angular
              [img]="CheckCircle2"
              class="selected-icon">
            </lucide-angular>

          } @else {

            <lucide-angular
              [img]="Circle"
              class="radio-icon">
            </lucide-angular>

          }

        </div>

        <div class="type-content">

          <h3 class="type-title">
            {{ type.title }}
          </h3>

          <p class="type-description">
            {{ type.description }}
          </p>

          <div class="type-recommendation">
            {{ type.recommendation }}
          </div>

        </div>

        <div class="icon-box">

          <lucide-angular
            [img]="type.icon"
            class="type-icon">
          </lucide-angular>

        </div>

      </button>

    }

  </div>

  <div class="selected-panel">

    <span class="selected-label">
      סוג קמפיין נבחר:
    </span>

    <span class="selected-value">
      {{ getSelectedTypeLabel() }}
    </span>

  </div>

</div>
