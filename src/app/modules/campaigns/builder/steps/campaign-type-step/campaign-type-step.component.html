<div class="campaign-type-step">
  <div class="campaign-type-header">
    <h2 class="campaign-type-title">
      בחר סוג קמפיין
    </h2>

    <p class="campaign-type-description">
      כל סוג מתאים למטרה אחרת
    </p>
  </div>

  <div class="types-grid">

    <button
      type="button"
      class="type-card all-or-nothing"
      [class.selected]="selectedType === 'all-or-nothing'"
      (click)="selectType('all-or-nothing')">

      @if (selectedType === 'all-or-nothing') {

        <div class="selected-badge">
          ✓
        </div>

      }

      <div class="type-icon">
        🎯
      </div>

      <div class="type-content">

        <h3 class="type-title">
          הכל או כלום
        </h3>

        <p class="type-description">
          תקבלו את הכסף רק אם תגיעו ליעד המלא
        </p>

      </div>

    </button>

    <button
      type="button"
      class="type-card flexible"
      [class.selected]="selectedType === 'flexible'"
      (click)="selectType('flexible')">

      @if (selectedType === 'flexible') {

        <div class="selected-badge">
          ✓
        </div>

      }

      <div class="type-icon">
        📈
      </div>

      <div class="type-content">

        <h3 class="type-title">
          גיוס גמיש
        </h3>

        <p class="type-description">
          כל סכום שיגויס יועבר לעמותה גם אם היעד לא הושג
        </p>

      </div>

    </button>

    <button
      type="button"
      class="type-card recurring"
      [class.selected]="selectedType === 'recurring'"
      (click)="selectType('recurring')">

      @if (selectedType === 'recurring') {

        <div class="selected-badge">
          ✓
        </div>

      }

      <div class="type-icon">
        🔄
      </div>

      <div class="type-content">

        <h3 class="type-title">
          הוראות קבע
        </h3>

        <p class="type-description">
          תרומות חודשיות קבועות ללא הגבלת זמן
        </p>

      </div>

    </button>

    <button
      type="button"
      class="type-card matching"
      [class.selected]="selectedType === 'matching'"
      (click)="selectType('matching')">

      @if (selectedType === 'matching') {

        <div class="selected-badge">
          ✓
        </div>

      }

      <div class="type-icon">
        ⚡
      </div>

      <div class="type-content">

        <h3 class="type-title">
          מאצ'ינג
        </h3>

        <p class="type-description">
          כל תרומה מוכפלת לפי היחס שתקבעו
        </p>

      </div>

    </button>

  </div>

  <div class="selected-type-panel">

    <span class="selected-type-label">
      סוג קמפיין נבחר:
    </span>

    <span class="selected-type-value">
      {{ getSelectedTypeLabel() }}
    </span>

  </div>

  <div class="campaign-note">

    <strong>
      חשוב לדעת:
    </strong>

    ניתן לשנות את סוג הקמפיין עד לפרסום הראשון.

  </div>
</div>
