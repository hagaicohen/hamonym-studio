<div class="campaign-content-step">

  <div class="step-header">

    <h1 class="step-title">
      תוכן הקמפיין
    </h1>

    <p class="step-description">
      הוסף תמונה וסרטון כדי לספר את הסיפור
    </p>

  </div>

  <div class="field-section">

    <label class="field-label">
      תמונה ראשית
    </label>

    <label class="upload-area" [class.has-image]="draft.coverImageUrl">

      <input
        type="file"
        accept="image/*"
        class="hidden-file-input"
        (change)="onFileSelected($event)">

      @if (draft.coverImageUrl) {

        <img
          [src]="draft.coverImageUrl"
          class="cover-preview"
          alt="תמונת קמפיין">

        <div class="cover-overlay">
          <lucide-angular [img]="Upload" class="upload-icon-small"></lucide-angular>
          <span>החלף תמונה</span>
        </div>

      } @else {

        <lucide-angular
          [img]="Image"
          class="upload-icon">
        </lucide-angular>

        <div class="upload-title">
          לחץ להעלאת תמונה
        </div>

        <div class="upload-subtitle">
          JPG, PNG עד 5MB
        </div>

      }

    </label>

  </div>

  <div class="field-section">

    <label class="field-label">
      סרטון (YouTube/Vimeo)
    </label>

    <div class="video-input-wrapper">

      <input
        type="text"
        [(ngModel)]="draft.videoUrl"
        (ngModelChange)="sync()"
        class="video-input"
        placeholder="https://www.youtube.com/watch?v=...">

      <lucide-angular
        [img]="Video"
        class="video-icon">
      </lucide-angular>

    </div>

    <div class="field-help">
      ניתן להשתמש רק בקישורים
      מ־YouTube או Vimeo
    </div>

  </div>

  <div class="tip-box">

    <strong>
      טיפ:
    </strong>

    קמפיינים עם סרטון מקבלים
    בממוצע פי 2 יותר תרומות.

    סרטון קצר של 1–2 דקות
    הוא האידיאלי.

  </div>

</div>
