<div class="stepper">

  <div class="stepper-header">

    שלב {{ currentStep }} מתוך 5

  </div>

  <div class="stepper-progress">

    <div class="step-dot"
         [class.active]="currentStep >= 1">
      1
    </div>

    <div class="step-line"
         [class.active]="currentStep > 1">
    </div>

    <div class="step-dot"
         [class.active]="currentStep >= 2">
      2
    </div>

    <div class="step-line"
         [class.active]="currentStep > 2">
    </div>

    <div class="step-dot"
         [class.active]="currentStep >= 3">
      3
    </div>

    <div class="step-line"
         [class.active]="currentStep > 3">
    </div>

    <div class="step-dot"
         [class.active]="currentStep >= 4">
      4
    </div>

    <div class="step-line"
         [class.active]="currentStep > 4">
    </div>

    <div class="step-dot"
         [class.active]="currentStep >= 5">
      5
    </div>

  </div>

  <div class="stepper-labels">

    <div class="stepper-label">
      סוג
    </div>

    <div class="stepper-label">
      פרטים
    </div>

    <div class="stepper-label">
      מדיה
    </div>

    <div class="stepper-label">
      גיוס
    </div>

    <div class="stepper-label">
      פרסום
    </div>

  </div>

</div>
