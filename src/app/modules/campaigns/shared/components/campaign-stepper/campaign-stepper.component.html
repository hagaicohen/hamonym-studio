<div class="stepper" [class.edit-mode]="editMode">
  <div class="stepper-header">
    @if (editMode) {
      עריכת קמפיין — שלב {{ currentStep }} מתוך {{ steps.length }}
    } @else {
      שלב {{ currentStep }} מתוך {{ steps.length }}
    }
  </div>

  <div class="stepper-items">
    @for (step of steps; track $index) {
      <div class="stepper-item" [class.clickable]="editMode" (click)="selectStep($index)">
        <div class="step-dot" [class.active]="currentStep >= $index + 1" [class.current]="currentStep === $index + 1">
          {{ $index + 1 }}
        </div>

        <div class="stepper-label" [class.active-label]="currentStep === $index + 1">
          {{ step }}
        </div>
      </div>

      @if ($index < steps.length - 1) {
        <div class="step-line" [class.active]="currentStep > $index + 1"></div>
      }
    }
  </div>
</div>
