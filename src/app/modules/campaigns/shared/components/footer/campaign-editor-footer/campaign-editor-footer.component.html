<div class="footer">
  <button
    type="button"
    class="secondary-button"
    (click)="previous.emit()"
    [disabled]="currentStep === 1"
  >
    הקודם
  </button>

  @if (currentStep < 8) {
    <button
      type="button"
      class="primary-button"
      (click)="next.emit()"
      [disabled]="!canContinue || isSaving">
      @if (isSaving) {
        <span class="btn-spinner"></span>
      } @else {
        המשך
      }
    </button>
  }
</div>
