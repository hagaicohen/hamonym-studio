<div class="step-card">

  <!-- HEADER -->

  <div class="step-header">

    <h1>
      הצטרפות כעמותה
    </h1>

    <div class="step-number">
      שלב 5 מתוך 6
    </div>

  </div>

  <!-- PROGRESS -->

  <div class="progress-bar-wrapper">

    <div class="progress-bar">

      <div
        class="progress-fill"
        style="width: 83.33%">
      </div>

    </div>

    <div class="progress-steps">

      <div class="progress-step done">1</div>
      <div class="progress-step done">2</div>
      <div class="progress-step done">3</div>
      <div class="progress-step done">4</div>
      <div class="progress-step active">5</div>
      <div class="progress-step">6</div>

    </div>

  </div>

  <!-- BODY -->

  <div class="step-body">

    <!-- HERO -->

    <div class="review-hero">

      <div class="review-icon">

        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round">

          <path d="M20 6 9 17l-5-5"></path>

        </svg>

      </div>

      <h2>
        לפני שמתחילים
      </h2>

      <p>
        בדקו את פרטי העמותה לפני סיום ההגדרה
      </p>

    </div>

    <!-- ORGANIZATION -->

    <div class="review-section">

      <div class="review-section-title">
        פרטי עמותה
      </div>

      <div class="review-row">

        <span class="review-label">
          שם עמותה
        </span>

        <span class="review-value">
          עמותת אור לחיים
        </span>

      </div>

      <div class="review-row">

        <span class="review-label">
          סוגי קמפיינים
        </span>

        <span class="review-value">
          תרומות חד־פעמיות, תרומות קבועות
        </span>

      </div>

      <div class="review-row">

        <span class="review-label">
          ספק סליקה
        </span>

        <span class="review-value success-text">
          קארדקום מחובר
        </span>

      </div>

    </div>

    <!-- AGREEMENTS -->

    <div class="review-section">

      <div class="review-section-title">
        אישורים
      </div>

      <label class="agreement-row">

        <input type="checkbox">

        <span>
          קראתי ואישרתי את תנאי השימוש
        </span>

      </label>

      <label class="agreement-row">

        <input type="checkbox">

        <span>
          קראתי ואישרתי את מדיניות הפרטיות
        </span>

      </label>

    </div>

    <!-- ACTIONS -->

    <div class="wizard-actions">

      <button
        type="button"
        class="secondary-btn">

        חזור

      </button>

      <button
        type="button"
        class="continue-btn">

        סיום והקמת העמותה

      </button>

    </div>

  </div>

</div>
