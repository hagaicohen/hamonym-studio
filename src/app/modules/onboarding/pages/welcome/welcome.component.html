<div class="welcome-page">

  <div class="welcome-logo">
    <img src="/logo.png" alt="המונים" />
  </div>

  <div class="welcome-content">

    <h1 class="welcome-title">
      ברוכים הבאים{{ userName ? ' ' + userName : '' }} 👋
    </h1>
    <p class="welcome-subtitle">מה תרצה לעשות?</p>

    <div class="welcome-cards">
      <button
        *ngFor="let card of cards"
        class="welcome-card"
        (click)="select(card)"
      >
        <span class="card-icon">{{ card.icon }}</span>
        <div class="card-text">
          <span class="card-title">{{ card.title }}</span>
          <span class="card-description">{{ card.description }}</span>
        </div>
        <svg class="card-arrow" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
      </button>
    </div>

  </div>

</div>
