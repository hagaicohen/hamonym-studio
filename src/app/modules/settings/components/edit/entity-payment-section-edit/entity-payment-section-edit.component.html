<div class="settings-card">
  <!-- HEADER -->

  <div class="card-top">
    <div>
      <div class="section-title-row">
        <lucide-icon [img]="WalletCards" class="section-icon"> </lucide-icon>

        <div class="card-title">מסוף אשראי</div>
      </div>

      <div class="card-description">חיבור והגדרות ספק הסליקה</div>
    </div>
    <div class="card-actions">
      <button
        class="cancel-btn"
        type="button"
        [disabled]="saveState.isSaving"
        (click)="cancel.emit()"
      >
        ביטול
      </button>

      <button
        class="save-btn"
        type="button"
        [class.success]="saveState.saveCompleted"
        [class.error]="saveState.saveFailed"
        [disabled]="saveState.isSaving"
        (click)="save.emit()"
      >
        @if (
          !saveState.isSaving &&
          !saveState.saveCompleted &&
          !saveState.saveFailed
        ) {
          שמירה
        }

        @if (saveState.isSaving) {
          <div class="btn-spinner"></div>
        }

        @if (!saveState.isSaving && saveState.saveCompleted) {
          <div class="save-success">✓ נשמר</div>
        }

        @if (!saveState.isSaving && saveState.saveFailed) {
          <div class="save-failed">✕ נכשל</div>
        }
      </button>
    </div>
  </div>

  <!-- PROVIDER -->

  <div class="field-block">
    <label> ספק סליקה </label>

    <select [(ngModel)]="model.billing_provider" class="base-input">
      <option value="cardcom">קארדקום</option>
    </select>
  </div>

  <ng-container>
    <!-- TERMINAL -->

    <div class="field-block">
      <label> מספר מסוף </label>

      <input
        type="text"
        class="base-input"
        [(ngModel)]="model.cardcom_terminal_number"
        placeholder="1234567"
      />
    </div>

    <!-- USERNAME -->

    <div class="field-block">
      <label> משתמש API </label>

      <input
        type="text"
        class="base-input"
        [(ngModel)]="model.cardcom_api_username"
        placeholder="username"
      />
    </div>

    <!-- PASSWORD -->

    <div class="field-block">
      <label> סיסמת API </label>

      <input
        type="password"
        class="base-input"
        [(ngModel)]="model.cardcom_api_password"
        placeholder="••••••••"
      />
    </div>

    <!-- STATUS -->

    <div class="connection-status" [ngClass]="statusClass">
      {{ statusLabel }}
    </div>

    <!-- ERROR -->
    <!--
    <div
      class="connection-error"
      *ngIf="
        model.cardcom_connection_status === 'failed'
        && model.cardcom_last_error
      ">

      {{ model.cardcom_last_error }}

    </div>
-->
    <!-- TEST -->

    <button
      type="button"
      class="test-connection-btn"
      [disabled]="isCheckingConnection"
      (click)="testConnection.emit(model)"
    >
      <span *ngIf="isCheckingConnection" class="btn-spinner"> </span>

      <span>
        {{ isCheckingConnection ? "בודק חיבור..." : "בדוק חיבור" }}
      </span>
    </button>
  </ng-container>
</div>
