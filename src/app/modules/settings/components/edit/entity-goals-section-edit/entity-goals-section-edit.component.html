<div class="settings-card">
  <!-- HEADER -->

  <div class="card-top">
    <div>
      <div class="header-content">
        <div class="section-title-row">
          <lucide-icon
            [img]="TrendingUp"
            class="section-icon">
          </lucide-icon>

          <div class="card-title">
            יעדי גיוס
          </div>
        </div>

        <div class="card-description">הגדירו את יעדי הגיוס שלכם בפלטפורמה</div>
      </div>
    </div>
    <div class="card-actions">

  <button
    class="cancel-btn"
    type="button"
    [disabled]="saveState.isSaving"
    (click)="cancel.emit()">

    ביטול

  </button>

  <button
    class="save-btn"
    type="button"
    [class.success]="saveState.saveCompleted"
    [class.error]="saveState.saveFailed"
    [disabled]="saveState.isSaving"
    (click)="save.emit()">

    @if (
      !saveState.isSaving &&
      !saveState.saveCompleted &&
      !saveState.saveFailed
    ) {

      שמירה

    }

    @if (saveState.isSaving) {

      <div class="btn-spinner"></div>

    }

    @if (
      !saveState.isSaving &&
      saveState.saveCompleted
    ) {

      <div class="save-success">

        ✓ נשמר

      </div>

    }

    @if (
      !saveState.isSaving &&
      saveState.saveFailed
    ) {

      <div class="save-failed">

        ✕ נכשל

      </div>

    }

  </button>

</div>
  </div>

  <!-- BODY -->

  <div class="goals-grid">
    <!-- MONTHLY -->

    <div class="goal-field">
      <div class="field-label">יעד גיוס חודשי</div>

      <div class="money-input-wrapper">
        <span class="money-symbol"> ₪ </span>

        <input
          type="text"
          class="money-input"
          placeholder="50,000"
          [ngModel]="monthlyGoalDisplay"
          (ngModelChange)="onMoneyInput('monthly_goal', $event)"
        />
      </div>
    </div>

    <!-- YEARLY -->

    <div class="goal-field">
      <div class="field-label">יעד גיוס שנתי</div>

      <div class="money-input-wrapper">
        <span class="money-symbol"> ₪ </span>

        <input
          type="text"
          class="money-input"
          placeholder="600,000"
          [ngModel]="yearlyGoalDisplay"
          (ngModelChange)="onMoneyInput('yearly_goal', $event)"
        />
      </div>
    </div>
  </div>

  @if (!hasGoals) {
    <div class="field-error">חובה להזין יעד חודשי ושנתי</div>
  }

  <div class="info-box">
    הנתונים האלו משמשים להתאמת המלצות וכלי צמיחה בפלטפורמה.
  </div>
</div>
