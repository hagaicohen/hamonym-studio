<div class="profile-settings-page">

  <!-- HEADER -->

  <div class="page-header">

    <div>

      <h1>
        פרטי ישות
      </h1>

      <p>
        ניהול פרטי הישות והמידע הציבורי
      </p>

    </div>

  </div>

<!-- BASIC INFO -->
<app-entity-basic-info-section
  [entity]="entity">
</app-entity-basic-info-section>

  <!-- BRANDING -->

  <div class="settings-card">

    <div class="card-top">

      <div>

        <div class="card-title">
          מיתוג
        </div>

        <div class="card-description">
          לוגו, צבעים ותצוגה ציבורית
        </div>

      </div>

      <button
        type="button"
        class="edit-btn">

        עריכה

      </button>

    </div>

    <div class="branding-preview">

      <div class="logo-placeholder">
        לוגו
      </div>

      <div class="branding-info">

        <div class="branding-name">
          צבע ראשי
        </div>

        <div class="branding-color">
          #2563EB
        </div>

      </div>

    </div>

  </div>

  <!-- DOCUMENTS -->

  <div class="settings-card">

    <div class="card-top">

      <div>

        <div class="card-title">
          מסמכים
        </div>

        <div class="card-description">
          מסמכי עמותה ואישורים
        </div>

      </div>

      <button
        type="button"
        class="edit-btn">

        ניהול מסמכים

      </button>

    </div>

    <div class="documents-list">

      <div class="document-item">

        <span>
          אישור ניהול תקין
        </span>

        <span class="document-status active">
          מאושר
        </span>

      </div>

      <div class="document-item">

        <span>
          אישור מס הכנסה
        </span>

        <span class="document-status pending">
          בבדיקה
        </span>

      </div>

    </div>

  </div>

</div>
