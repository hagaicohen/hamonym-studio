<div class="cp-wrap">

  <!-- TRIGGER -->
  <button type="button" class="cp-trigger" (click)="toggle()">
    <span class="cp-swatch"
      [class.cp-swatch--none]="isTransparent(value)"
      [style.background]="isTransparent(value) ? '' : value">
    </span>
    <span class="cp-trigger-label" *ngIf="label">{{ label }}</span>
    <span class="cp-trigger-value">{{ isTransparent(value) ? 'ללא' : value }}</span>
    <span class="cp-chevron">›</span>
  </button>

  <!-- DROPDOWN -->
  <div class="cp-dropdown" *ngIf="open"
    [style.top.px]="dropdownTop"
    [style.right.px]="dropdownRight"
    [style.max-height.px]="dropdownMaxHeight">

    <!-- HEX INPUT (accepts #FFFFFF or FFFFFF) -->
    <div class="cp-hex-row">
      <span class="cp-hex-preview" [style.background]="livePreview || '#fff'"></span>
      <input class="cp-hex-input" type="text"
        [(ngModel)]="hexInput"
        (ngModelChange)="onHexInput()"
        (keydown.enter)="applyHex()"
        (click)="$event.stopPropagation()"
        placeholder="#FFFFFF"
        dir="ltr">
      <button class="cp-hex-apply" type="button" (click)="applyHex()">✓</button>
    </div>

    <!-- NATIVE PICKER -->
    <label class="cp-free-picker">
      <input type="color" class="cp-native-hidden"
        [value]="isTransparent(value) ? '#ffffff' : value"
        (input)="onNativeColorInput($event)">
      <span class="cp-free-label">בחר צבע חופשי</span>
      <span class="cp-free-arrow">›</span>
    </label>

    <div class="cp-divider"></div>

    <!-- COMPACT PALETTE -->
    <div class="cp-grid">
      <button *ngIf="showNone"
        class="cp-sq cp-sq--none"
        [class.cp-sq--active]="isTransparent(value)"
        (click)="select('')" title="ללא">
      </button>
      <button *ngFor="let c of compactPalette"
        class="cp-sq"
        [style.background]="c"
        [class.cp-sq--active]="value === c"
        [class.cp-sq--light]="isLight(c)"
        (click)="select(c)"
        [title]="c">
      </button>
    </div>

    <div class="cp-divider"></div>

    <!-- CSS NAMES SEARCH -->
    <input class="cp-search" type="text"
      [(ngModel)]="nameSearch"
      placeholder="חפש שם CSS (red, blue...)"
      (click)="$event.stopPropagation()">

    <div class="cp-names-grid" *ngIf="filteredNames.length > 0">
      <button *ngFor="let name of filteredNames"
        class="cp-sq"
        [style.background]="name"
        [class.cp-sq--active]="value === name"
        (click)="select(name)"
        [title]="name">
        <span class="cp-sq-tip">{{ name }}</span>
      </button>
    </div>

  </div>
</div>
