<!-- rich-text-editor.component.html -->

<div class="editor-shell">

  <div
    class="editor-toolbar"
    *ngIf="editor"
  >

    <div class="toolbar-group">

      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('bold')"
        (click)="toggleBold()"
      >
        <strong>B</strong>
      </button>

      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('italic')"
        (click)="toggleItalic()"
      >
        <em>I</em>
      </button>

      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('underline')"
        (click)="toggleUnderline()"
      >
        <u>U</u>
      </button>

      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('strike')"
        (click)="toggleStrike()"
      >
        S
      </button>

      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('highlight')"
        (click)="toggleHighlight()"
      >
        🖍
      </button>

    </div>

    <div class="toolbar-group">

      <button
        type="button"
        class="toolbar-btn text-btn"
        [class.active]="isActive('heading', { level: 1 })"
        (click)="setHeading(1)"
      >
        H1
      </button>

      <button
        type="button"
        class="toolbar-btn text-btn"
        [class.active]="isActive('heading', { level: 2 })"
        (click)="setHeading(2)"
      >
        H2
      </button>

      <button
        type="button"
        class="toolbar-btn text-btn"
        [class.active]="isActive('heading', { level: 3 })"
        (click)="setHeading(3)"
      >
        H3
      </button>

      <button
        type="button"
        class="toolbar-btn text-btn"
        [class.active]="isActive('paragraph')"
        (click)="setParagraph()"
      >
        P
      </button>

    </div>

    <div class="toolbar-group">

      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('bulletList')"
        (click)="toggleBulletList()"
      >
        •
      </button>

      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('orderedList')"
        (click)="toggleOrderedList()"
      >
        1.
      </button>

      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('taskList')"
        (click)="toggleTaskList()"
      >
        ☑
      </button>

    </div>

  </div>

  <button
    type="button"
    class="floating-add-btn"
    (click)="insertHorizontalRule()"
  >
    +
  </button>

  <div
    #editor
    class="editor-content"
    [style.minHeight.px]="minHeight"
  ></div>

</div>
