<!-- rich-text-editor.component.html -->

<div class="editor-shell">
  <div class="editor-toolbar" *ngIf="editor">
    <!-- TEXT STYLE -->

    <div class="toolbar-group">
      <select
        class="toolbar-select"
        [value]="getCurrentBlockType()"
        (change)="onBlockTypeChange($event)"
      >
        <option value="paragraph">Normal</option>

        <option value="h1">Heading 1</option>

        <option value="h2">Heading 2</option>

        <option value="h3">Heading 3</option>
      </select>
    </div>

    <!-- INLINE -->

    <div class="toolbar-group">
      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('bold')"
        (click)="toggleBold()"
      >
        <strong>B</strong>
      </button>

      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('italic')"
        (click)="toggleItalic()"
      >
        <em>I</em>
      </button>

      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('underline')"
        (click)="toggleUnderline()"
      >
        <u>U</u>
      </button>

      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('strike')"
        (click)="toggleStrike()"
      >
        <s>S</s>
      </button>
    </div>

    <!-- LISTS -->

    <div class="toolbar-group">
      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('bulletList')"
        (click)="toggleBulletList()"
      >
        •
      </button>

      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('orderedList')"
        (click)="toggleOrderedList()"
      >
        1.
      </button>
    </div>

    <!-- ALIGN -->

    <div class="toolbar-group">
      <button type="button" class="toolbar-btn" (click)="setTextAlign('right')">
        ≡
      </button>

      <button
        type="button"
        class="toolbar-btn"
        (click)="setTextAlign('center')"
      >
        ☰
      </button>

      <button type="button" class="toolbar-btn" (click)="setTextAlign('left')">
        ☷
      </button>
    </div>

    <!-- LINK -->

    <div class="toolbar-group">
      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('link')"
        (click)="addLink()"
      >
        🔗
      </button>

      <button type="button" class="toolbar-btn danger" (click)="removeLink()">
        ✕
      </button>
    </div>

    <!-- EXTRA -->

    <div class="toolbar-group">
      <button
        type="button"
        class="toolbar-btn"
        [class.active]="isActive('blockquote')"
        (click)="toggleBlockquote()"
      >
        ❝
      </button>

      <button type="button" class="toolbar-btn" (click)="clearFormatting()">
        Tx
      </button>
    </div>
  </div>

  <div #editor class="editor-content" [style.minHeight.px]="minHeight"></div>
</div>
