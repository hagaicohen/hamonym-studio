<header class="topbar">

  <!-- RIGHT: mobile menu + logo -->
  <div class="topbar-right">
    <button class="topbar-icon-btn mobile-menu-btn" (click)="menuClick.emit()">
      <svg class="menu-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 17.25h16.5" />
      </svg>
    </button>
    <div class="brand">
      <img src="./logo.png" alt="Hamonym Logo" class="brand-logo" />
    </div>
  </div>

  <!-- LEFT: notifications + identity switcher + avatar -->
  <div class="topbar-left">

    <!-- BELL -->
    <button class="topbar-icon-btn notif-btn" title="התראות">
      <svg class="icon-sm" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0018 9.75v-.7V9a6 6 0 10-12 0v.05-.001v.7a8.967 8.967 0 00-2.312 6.022c1.733.64 3.56 1.081 5.454 1.31m5.715 0a24.255 24.255 0 01-5.715 0m5.715 0a3 3 0 11-5.715 0" />
      </svg>
      <span class="notif-badge">3</span>
    </button>

    <!-- MAIL -->
    <button class="topbar-icon-btn notif-btn" title="הודעות">
      <svg class="icon-sm" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
      </svg>
      <span class="notif-badge">2</span>
    </button>

    <!-- IDENTITY SWITCHER — always visible -->
    <div class="ctx-wrapper" (click)="toggleDropdown($event)">

      <!-- 3-LINE BUTTON -->
      <button class="ctx-btn" [class.open]="dropdownOpen">
        <div class="ctx-btn-inner">

          <ng-container *ngIf="ctx.active() as active; else noRole">
            <!-- Line 1: role icon + label (small gray) -->
            <span class="ctx-role-line">
              <span class="ctx-role-icon">{{ active.roleIcon }}</span>
              {{ active.roleLabel }}
            </span>
            <!-- Line 2: USER NAME — hero element + chevron -->
            <span class="ctx-user-line">
              {{ userFullName() }}
              <svg class="ctx-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
              </svg>
            </span>
            <!-- Line 3: entity name (small gray) -->
            <span class="ctx-entity-line" *ngIf="active.context">{{ active.context.name }}</span>
          </ng-container>

          <!-- No active role -->
          <ng-template #noRole>
            <span class="ctx-user-line ctx-no-role">
              👤 בחר זהות
              <svg class="ctx-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
              </svg>
            </span>
          </ng-template>

        </div>
      </button>

      <!-- IDENTITY CENTER DROPDOWN -->
      <div class="ctx-dropdown" *ngIf="dropdownOpen">

        <!-- Header -->
        <div class="ctx-dropdown-title">הזהויות שלי</div>

        <!-- Role groups (roles the user has) -->
        <ng-container *ngIf="ctx.roles().length > 0">
          <ng-container *ngFor="let group of ctx.roles()">
            <div class="ctx-group-header">
              <span class="ctx-group-icon">{{ group.icon }}</span>
              <span class="ctx-group-label">{{ group.label }}</span>
            </div>

            <!-- Contexts under this role -->
            <div
              *ngFor="let context of group.contexts"
              class="ctx-context-item"
              [class.is-active]="ctx.isActiveContext(group.role, context.id)"
              (click)="switchContext(group.role, context.id, $event)"
            >
              <svg *ngIf="ctx.isActiveContext(group.role, context.id)" class="ctx-check" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
              </svg>
              <span class="ctx-context-name">{{ context.name }}</span>
            </div>
          </ng-container>
          <!-- single divider only when there are roles above the actions -->
          <div class="ctx-divider"></div>
        </ng-container>

        <div class="ctx-action-item" (click)="navigateTo('/organization-registration', $event)">
          <span class="ctx-action-icon">🏗️</span>
          <span>הקמת עמותה חדשה</span>
        </div>

        <div class="ctx-action-item" (click)="navigateTo('/campaigns/discover', $event)">
          <span class="ctx-action-icon">🤝</span>
          <span>הצטרפות כשגריר</span>
        </div>

        <div class="ctx-action-item" (click)="navigateTo('/company-registration', $event)">
          <span class="ctx-action-icon">🏭</span>
          <span>רישום חברה</span>
        </div>

        <div class="ctx-divider"></div>

        <!-- Manage identities -->
        <div class="ctx-manage-row" (click)="navigateTo('/settings', $event)">
          <svg class="icon-sm" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.43l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <span>ניהול זהויות</span>
        </div>

      </div>

    </div>

    <!-- AVATAR: real photo if available, else default person icon -->
    <div class="topbar-avatar" [title]="userFullName()">
      <img *ngIf="userPhoto(); else defaultAvatar" [src]="userPhoto()" [alt]="userFullName()" class="avatar-photo" />
      <ng-template #defaultAvatar>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="avatar-icon">
          <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z" clip-rule="evenodd" />
        </svg>
      </ng-template>
    </div>

    <!-- LOGOUT -->
    <button class="logout-btn" (click)="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" x2="9" y1="12" y2="12"></line>
      </svg>
    </button>

  </div>
</header>
