<!-- src/app/core/layout/topbar/topbar.component.html -->

<header class="topbar">

  <!-- RIGHT -->

  <div class="topbar-right">

    <!-- MOBILE MENU -->

    <button
      class="topbar-icon-btn mobile-menu-btn"
      (click)="menuClick.emit()">

      <svg
        class="menu-icon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor">

        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 6.75h16.5" />

        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 12h16.5" />

        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 17.25h16.5" />

      </svg>

    </button>

    <!-- LOGO -->

    <div class="brand">

      <img
        src="./logo.png"
        alt="Hamonym Logo"
        class="brand-logo">

    </div>

  </div>

  <!-- LEFT -->

  <div class="topbar-left">

    <!-- NOTIFICATIONS -->

    <button class="topbar-icon-btn">

      <svg
        class="bell-icon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor">

        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0018 9.75v-.7V9a6 6 0 10-12 0v.05-.001v.7a8.967 8.967 0 00-2.312 6.022c1.733.64 3.56 1.081 5.454 1.31m5.715 0a24.255 24.255 0 01-5.715 0m5.715 0a3 3 0 11-5.715 0" />

      </svg>

    </button>

    <!-- USER -->

    <div class="topbar-user">

      <div class="topbar-user-name">
        Hagai Cohen
      </div>

      <div class="topbar-user-role">
        תורם
      </div>

    </div>

    <!-- LOGOUT -->

    <button class="topbar-icon-btn">

      <svg
        class="logout-icon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor">

        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6A2.25 2.25 0 005.25 5.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15" />

        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M18 12H9m0 0l3-3m-3 3l3 3" />

      </svg>

    </button>

  </div>

</header>
